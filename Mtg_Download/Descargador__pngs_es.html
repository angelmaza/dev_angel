<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Ang</title>
    <style>
        /* Estilos Generales */
        body {
            background-color: #2c2c2c;
            font-family: Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 0;
        }

        #error {
            text-align: center;
            color: rgb(255, 65, 65);
        }

        #num_cartas {
            text-align: center;
            color: rgb(226, 222, 222);
        }

        /* Encabezado */
        header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #1f1f1f;
            border-bottom: 4px solid orange;
            padding: 15px;
            flex-wrap: wrap;
        }

        header div {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
            min-width: 300px;
        }

        header div p {
            font-size: 1.1em;
            font-weight: bold;
            color: orange;
            text-align: center;
            margin-bottom: 10px;
        }

        header div input,
        header div textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid orange;
            border-radius: 5px;
            background-color: #333;
            color: white;
            font-size: 1em;
        }

        header div textarea {
            height: 80px;
        }

        header div button {
            width: 60%;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
            background-color: orange;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        header div button:hover {
            background-color: #ff9800;
        }

        /* Zona de Botones */
        #zonaboton {
            text-align: center;
            margin: 20px 0;
        }

        .boton-descarga {
            padding: 10px 15px;
            background-color: #ff5722;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .boton-descarga:hover {
            background-color: #e64a19;
        }

        /* Resultado - Cartas */
        #resultado {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }

        /* Tarjetas */
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1f1f1f;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(255, 165, 0, 0.4);
            transition: 0.3s ease;
            width: 200px;
            max-width: 200px;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 4px 4px 15px rgba(255, 165, 0, 0.6);
        }

        /* Texto dentro de las tarjetas */
        .card-nombre {
            font-size: 1em;
            font-weight: bold;
            margin: 10px 0;
            color: white;
        }

        /* Imágenes de las cartas */
        .card-imagen {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            padding: 10px;
        }

        #divprogreso {
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h3>Si algo malo pasa, no me hago responsable :)</h3>
            <p>Pegad lista de moxfield (more -> export -> copy for moxfield)  ----   si dejas sideboard tambien lo descarga</p>
            <!-- <input type="text" id="cartas" placeholder="texto cartas"> -->
            <textarea id="cartas" placeholder="exportar de moxfield"></textarea>
            <button onclick="buscarimg()">Busqueda descargar</button>
        </div>
    </header>
    <div id="zonaboton"></div>
    <div id="divprogreso"><progress id="progreso" max="0" value="0"></progress>
        <p id="estado">Esperando descarga...</p>
    </div>

    <div id="error"></div>
    <div id="num_cartas"></div>

    <div id="resultado"></div>
</body>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
  const api = "https://api.scryfall.com";
  const preferredLang = "es";
  const politeDelayMs = 120;

  const delay = (ms) => new Promise(r => setTimeout(r, ms));

  // Rank de calidad: png(3) > large(2) > normal(1) > small/none(0)
  function imageQualityRank(image_uris) {
    if (!image_uris) return 0;
    if (image_uris.png) return 3;
    if (image_uris.large) return 2;
    if (image_uris.normal) return 1;
    return 0; // small o nada
  }

  // Elige URLs de imagen
  function pickBestImage(image_uris) {
    const display = image_uris?.large || image_uris?.normal || image_uris?.small || null;
    const download = image_uris?.png || image_uris?.large || image_uris?.normal || image_uris?.small || null;
    return { display, download, rank: imageQualityRank(image_uris) };
  }

  // Normaliza una "carta" a entradas [nombre, displayURL, downloadURL], con posible fallback EN por cara
  function normalizeCardToEntriesWithFallback(esCard, enFallbackCard) {
    const entries = [];
    const isDFC = esCard.card_faces && ((esCard.layout === 'transform') || (esCard.layout === 'modal_dfc') || (esCard.layout === 'double_faced_token'));

    if (isDFC) {
      const esFaces = esCard.card_faces;
      const enFaces = enFallbackCard?.card_faces || null;

      esFaces.forEach((face, idx) => {
        const esPick = pickBestImage(face.image_uris || {});
        let display = esPick.display;
        let download = esPick.download;
        let usedEN = false;

        // Si la cara ES solo tiene small (rank 0), intentamos usar la cara EN correspondiente
        if (esPick.rank === 0 && enFallbackCard) {
          const enFace = enFaces ? enFaces[idx] : null;
          const enPick = pickBestImage((enFace ? enFace.image_uris : (enFallbackCard.image_uris || {})));
          if (enPick.rank > esPick.rank) {
            display = enPick.display;
            download = enPick.download;
            usedEN = true;
          }
        }

        const shownName = face.printed_name || face.name; // mantenemos nombre ES si existe
        if (display || download) entries.push([shownName, display, download || display, usedEN ? 'en' : 'es']);
      });
    } else {
      const esPick = pickBestImage(esCard.image_uris || esCard.card_faces?.[0]?.image_uris || {});
      let display = esPick.display;
      let download = esPick.download;
      let usedEN = false;

      if (esPick.rank === 0 && enFallbackCard) {
        const enPick = pickBestImage(enFallbackCard.image_uris || enFallbackCard.card_faces?.[0]?.image_uris || {});
        if (enPick.rank > esPick.rank) {
          display = enPick.display;
          download = enPick.download;
          usedEN = true;
        }
      }

      const shownName = esCard.printed_name || esCard.name;
      if (display || download) entries.push([shownName, display, download || display, usedEN ? 'en' : 'es']);
    }
    return entries;
  }

  // named?exact
  async function fetchByExactName(name) {
    const url = `${api}/cards/named?exact=${encodeURIComponent(name)}`;
    const resp = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!resp.ok) throw new Error(`named?exact fallo: ${resp.status} ${resp.statusText}`);
    return resp.json();
  }

  // search por oracleid y lang
  async function fetchPrintsByOracleAndLang(oracleId, lang) {
    const results = [];
    let next = `${api}/cards/search?q=${encodeURIComponent(`oracleid:${oracleId} lang:${lang}`)}&unique=prints`;
    while (next) {
      const resp = await fetch(next, { headers: { "Accept": "application/json" } });
      if (!resp.ok) throw new Error(`search ${lang} fallo: ${resp.status} ${resp.statusText}`);
      const data = await resp.json();
      (data.data || []).forEach(c => results.push(c));
      next = data.has_more ? data.next_page : null;
      if (next) await delay(80);
    }
    return results;
  }

  // elige mejor impresión (criterios compartidos)
  function chooseBestPrint(cards) {
    if (!cards || cards.length === 0) return null;
    const scored = cards.map(c => {
      const iu = (c.image_uris || c.card_faces?.[0]?.image_uris || {});
      const rank = imageQualityRank(iu); // 0..3
      const highres = !!c.highres_image;
      const isPromo = c.set_type === "promo";
      const released = c.released_at || "1900-01-01";
      // score ponderado: rank + bonus highres - penalización promo
      const score = rank + (highres ? 1 : 0) - (isPromo ? 0.5 : 0);
      return { c, score, released };
    });
    scored.sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      return (b.released || "").localeCompare(a.released || "");
    });
    return scored[0].c;
  }

  async function buscarimg() {
    const cartas = procesarCartas();
    const cartas_final = [];
    const cajaerror = document.getElementById('error');
    cajaerror.innerHTML = "";
    const caja_contador = document.getElementById('num_cartas');
    caja_contador.innerHTML = "";

    let contador_pngs = 0;

    await Promise.all(cartas.map(async (carta) => {
      const { nombre } = carta;
      try {
        await delay(politeDelayMs);

        // 1) Base por nombre
        const base = await fetchByExactName(nombre);
        const oracleId = base.oracle_id;

        // 2) Buscar ES
        const printsEs = await fetchPrintsByOracleAndLang(oracleId, preferredLang);
        let chosenES = chooseBestPrint(printsEs);
        if (!chosenES) {
          // Sin español: usamos base y avisamos
          chosenES = base;
          const note = document.createElement('p');
          note.innerHTML = `No existe impresión en <strong>ES</strong> para <em>${nombre}</em>. Se usa la impresión por defecto.`;
          cajaerror.appendChild(note);
        }

        // 3) Preparar fallback EN SOLO si alguna cara ES es solo small
        let needEN = false;
        if (chosenES.card_faces && ((chosenES.layout === 'transform') || (chosenES.layout === 'modal_dfc') || (chosenES.layout === 'double_faced_token'))) {
          for (const face of chosenES.card_faces) {
            const rank = imageQualityRank(face.image_uris || {});
            if (rank === 0) { needEN = true; break; }
          }
        } else {
          const rank = imageQualityRank(chosenES.image_uris || chosenES.card_faces?.[0]?.image_uris || {});
          if (rank === 0) needEN = true;
        }

        let chosenEN = null;
        if (needEN) {
          const printsEn = await fetchPrintsByOracleAndLang(oracleId, "en");
          chosenEN = chooseBestPrint(printsEn) || null;
          if (!printsEs.length && chosenEN) {
            // si no había ES y usamos directamente EN, lo indicamos solo una vez
          } else if (chosenEN) {
            const warn = document.createElement('p');
            warn.innerHTML = `Para <em>${nombre}</em>, la imagen en ES era de baja calidad (small). Se sustituyó por una imagen en <strong>EN</strong> de alta calidad.`;
            cajaerror.appendChild(warn);
          }
        }

        // 4) Normalizar entradas con fallback por cara
        const entries = normalizeCardToEntriesWithFallback(chosenES, chosenEN);
        if (entries.length === 0) {
          const warn = document.createElement('p');
          warn.innerHTML = `Sin imágenes disponibles para <em>${nombre}</em>.`;
          cajaerror.appendChild(warn);
          return;
        }

        entries.forEach(e => cartas_final.push(e));
        contador_pngs += entries.length;

      } catch (error) {
        console.error(`❌ Error con ${nombre}:`, error);
        const err = document.createElement('h4');
        err.innerHTML = `No se ha podido obtener <em>${nombre}</em>. Revisa el nombre exacto o busca manualmente.`;
        cajaerror.appendChild(err);
      }
    }));

    caja_contador.innerHTML = `Total de <strong>${contador_pngs}</strong> cartas (las dobles cuentan como 2)`;
    mostrarlistacartas(cartas_final);
  }

  function mostrarlistacartas(cartas_final) {
    const contenedor = document.getElementById('resultado');
    contenedor.innerHTML = "";

    cartas_final.forEach(carta => {
      const card = document.createElement('div');
      card.classList.add('card');

      const nombre = document.createElement('p');
      nombre.textContent = carta[0];
      nombre.classList.add('card-nombre');

      const imagen = document.createElement('img');
      imagen.src = carta[1];
      imagen.loading = "lazy";
      imagen.decoding = "async";
      imagen.classList.add('card-imagen');

      card.appendChild(nombre);
      card.appendChild(imagen);
      contenedor.appendChild(card);
    });

    const downloadButton = document.createElement('button');
    downloadButton.classList = "boton-descarga";
    downloadButton.textContent = "Descargar todas (máxima calidad)";
    downloadButton.addEventListener('click', () => descargarTodasLasCartas(cartas_final));

    const cajaboton = document.getElementById('zonaboton');
    cajaboton.innerHTML = "";
    cajaboton.prepend(downloadButton);
  }

  function procesarCartas() {
    const texto = document.getElementById('cartas').value.trim();
    const lineas = texto.split('\n');
    const cartas = lineas.map(linea => {
      const linea_bien = linea.replace(/\*\S+\*/g, "").trim();
      const match = linea_bien.match(/^\d+\s+(.+?)\s+\(([^)]+)\)\s+(\S+)$/);
      if (match) {
        return { nombre: match[1].trim(), codigo: match[2], numero: match[3].trim() };
      }
      if (linea_bien) return { nombre: linea_bien, codigo: "", numero: "" };
      return null;
    }).filter(Boolean);
    return cartas;
  }

  async function descargarTodasLasCartas(cartas_final) {
    const zip = new JSZip();
    const folder = zip.folder("cards");

    const divprogreso = document.getElementById('divprogreso');
    divprogreso.style.display = 'inline-block';

    let progreso = document.getElementById("progreso");
    let estado = document.getElementById("estado");

    if (!progreso) {
      progreso = document.createElement("progress");
      progreso.id = "progreso";
      document.body.appendChild(progreso);
    }
    if (!estado) {
      estado = document.createElement("p");
      estado.id = "estado";
      document.body.appendChild(estado);
    }

    progreso.max = cartas_final.length;
    progreso.value = 0;

    for (let i = 0; i < cartas_final.length; i++) {
      const [nombre, , urlDescarga] = cartas_final[i];
      try {
        estado.textContent = `Descargando ${nombre} (${i + 1}/${cartas_final.length})...`;
        const resp = await fetch(urlDescarga);
        if (!resp.ok) throw new Error(`Error al descargar: ${nombre}`);
        const blob = await resp.blob();
        const safeName = (nombre || "carta").replace(/[<>:"/\\|?*\x00-\x1F]/g, "_");
        folder.file(`${String(i).padStart(3, "0")}_${safeName}.png`, blob);
        progreso.value = i + 1;
      } catch (e) {
        console.error(`Error descargando ${nombre}:`, e);
      }
      await delay(80);
    }

    estado.textContent = "Generando archivo ZIP...";
    const content = await zip.generateAsync({ type: "blob" });
    saveAs(content, "cards.zip");
    estado.textContent = "Descarga completada.";
    progreso.remove();
  }
</script>




</html>
